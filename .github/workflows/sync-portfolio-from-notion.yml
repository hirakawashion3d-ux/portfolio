name: Sync portfolio from Notion

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PORTFOLIO_PUSH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Notion deploy bundle and write files
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: |
         node --input-type=commonjs <<'NODE'
          (async () => {
           const fs = require('fs');
          const path = require('path');

          const notionToken = process.env.NOTION_TOKEN;
          const pageId = process.env.NOTION_PAGE_ID;

          if (!notionToken) throw new Error('Missing NOTION_TOKEN');
          if (!pageId) throw new Error('Missing NOTION_PAGE_ID');

          const NOTION_VERSION = '2022-06-28';
          const allowedFiles = new Set(['index.html', 'style.css', 'script.js']);
          const output = {};

          async function notionRequest(url) {
            const res = await fetch(url, {
              headers: {
                'Authorization': `Bearer ${notionToken}`,
                'Notion-Version': NOTION_VERSION,
                'Content-Type': 'application/json'
              }
            });

            if (!res.ok) {
              const body = await res.text();
              throw new Error(`Notion API error ${res.status}: ${body}`);
            }

            return res.json();
          }

          async function getBlockChildren(blockId) {
            const all = [];
            let cursor = undefined;

            do {
              const url = new URL(`https://api.notion.com/v1/blocks/${blockId}/children`);
              url.searchParams.set('page_size', '100');
              if (cursor) url.searchParams.set('start_cursor', cursor);

              const json = await notionRequest(url.toString());
              all.push(...json.results);
              cursor = json.has_more ? json.next_cursor : undefined;
            } while (cursor);

            return all;
          }

          function richTextToPlain(richText = []) {
            return richText.map(part => part.plain_text || '').join('');
          }

          function stripFileMarker(text, filename) {
            const lines = text.replace(/\r\n/g, '\n').split('\n');
            const markerPattern = new RegExp(`FILE:\\s*${filename.replace('.', '\\.')}`, 'i');

            const cleaned = lines.filter((line, index) => {
              if (index > 3) return true;
              return !markerPattern.test(line);
            });

            return cleaned.join('\n').trimStart();
          }

          async function walkBlocks(blocks) {
            for (const block of blocks) {
              if (block.type === 'code' && block.code) {
                const text = richTextToPlain(block.code.rich_text);
                const match = text.match(/FILE:\s*(index\.html|style\.css|script\.js)/i);

                if (match) {
                  const filename = match[1].toLowerCase();
                  if (allowedFiles.has(filename)) {
                    output[filename] = stripFileMarker(text, filename);
                  }
                }
              }

              if (block.has_children) {
                const children = await getBlockChildren(block.id);
                await walkBlocks(children);
              }
            }
          }

          const rootBlocks = await getBlockChildren(pageId);
          await walkBlocks(rootBlocks);

          for (const filename of allowedFiles) {
            if (!output[filename]) {
              throw new Error(`Missing required code block: FILE: ${filename}`);
            }

            if (!output[filename].trim()) {
              throw new Error(`Empty file content detected: ${filename}`);
            }
          }

          const combined = `${output['index.html']}\n${output['style.css']}\n${output['script.js']}`;

          if (/data:image\//i.test(combined)) {
            throw new Error('Blocked: base64 image data detected. Use images/ external references only.');
          }

          if (!/href=["']style\.css["']/i.test(output['index.html'])) {
            throw new Error('index.html must reference style.css');
          }

          if (!/src=["']script\.js["']/i.test(output['index.html'])) {
            throw new Error('index.html must reference script.js');
          }

          fs.writeFileSync(path.join(process.cwd(), 'index.html'), output['index.html'], 'utf8');
          fs.writeFileSync(path.join(process.cwd(), 'style.css'), output['style.css'], 'utf8');
          fs.writeFileSync(path.join(process.cwd(), 'script.js'), output['script.js'], 'utf8');

          console.log('Updated files from Notion deploy bundle:');
          console.log('- index.html');
          console.log('- style.css');
          console.log('- script.js');

          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE
      - name: Commit and push changes
        run: |
          if git diff --quiet -- index.html style.css script.js; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "portfolio-notion-bot"
          git config user.email "portfolio-notion-bot@users.noreply.github.com"
          git add index.html style.css script.js
          git commit -m "Sync portfolio files from Notion deploy bundle"
          git push
